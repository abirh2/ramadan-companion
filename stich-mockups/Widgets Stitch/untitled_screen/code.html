<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Deen Companion Widgets</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ec5b",
                        "background-light": "#f6f8f6",
                        "background-dark": "#102216",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-gray-100 font-display flex items-center justify-center min-h-screen p-8 dark:bg-gray-900">
<!-- Container for the widget presentation -->
<div class="w-full max-w-sm mx-auto space-y-8">
<!-- Medium Widget Container -->
<div class="bg-background-light dark:bg-background-dark rounded-[24px] shadow-lg overflow-hidden border border-gray-100 dark:border-gray-800 relative w-full aspect-[2/1] flex flex-col p-4">
<!-- Header Row -->
<div class="flex items-center justify-between mb-3">
<div class="flex flex-col">
<span class="text-[10px] uppercase tracking-wider font-semibold text-gray-500 dark:text-gray-400">Today's Goals</span>
<h2 class="text-base font-bold text-slate-900 dark:text-slate-100">Daily Deeds</h2>
</div>
<div class="flex items-center gap-1 bg-primary/10 px-2 py-1 rounded-full">
<span class="material-symbols-outlined text-sm text-primary" style="font-variation-settings: 'FILL' 1;">local_fire_department</span>
<span class="text-xs font-semibold text-primary">7 Days</span>
</div>
</div>
<!-- Tasks List -->
<div class="flex-1 flex flex-col justify-between gap-1">
<!-- Task 1 (Checked) -->
<label class="group flex items-center gap-3 cursor-pointer">
<div class="relative flex items-center justify-center">
<input checked="" class="peer appearance-none h-5 w-5 rounded-full border-2 border-primary/30 bg-transparent checked:bg-primary checked:border-primary focus:ring-0 focus:ring-offset-0 transition-colors duration-200" type="checkbox"/>
<span class="material-symbols-outlined absolute text-white text-[14px] opacity-0 peer-checked:opacity-100 pointer-events-none transition-opacity duration-200">check</span>
</div>
<span class="text-xs font-medium text-slate-400 line-through transition-colors duration-200">Read 2 pages of Quran</span>
</label>
<!-- Task 2 (Unchecked) -->
<label class="group flex items-center gap-3 cursor-pointer">
<div class="relative flex items-center justify-center">
<input class="peer appearance-none h-5 w-5 rounded-full border-2 border-gray-300 dark:border-gray-600 bg-transparent checked:bg-primary checked:border-primary focus:ring-0 focus:ring-offset-0 transition-colors duration-200" type="checkbox"/>
<span class="material-symbols-outlined absolute text-white text-[14px] opacity-0 peer-checked:opacity-100 pointer-events-none transition-opacity duration-200">check</span>
</div>
<span class="text-xs font-medium text-slate-900 dark:text-slate-100 group-hover:text-primary transition-colors duration-200">Morning Adhkar</span>
</label>
<!-- Task 3 (Unchecked) -->
<label class="group flex items-center gap-3 cursor-pointer">
<div class="relative flex items-center justify-center">
<input class="peer appearance-none h-5 w-5 rounded-full border-2 border-gray-300 dark:border-gray-600 bg-transparent checked:bg-primary checked:border-primary focus:ring-0 focus:ring-offset-0 transition-colors duration-200" type="checkbox"/>
<span class="material-symbols-outlined absolute text-white text-[14px] opacity-0 peer-checked:opacity-100 pointer-events-none transition-opacity duration-200">check</span>
</div>
<span class="text-xs font-medium text-slate-900 dark:text-slate-100 group-hover:text-primary transition-colors duration-200">Pray Duha</span>
</label>
</div>
</div>
<!-- Variation: Dark Mode Preview Label (Just for context, not part of widget) -->
<div class="text-center">
<p class="text-xs text-gray-400 font-medium">iOS Medium Widget • Daily Deeds</p>
</div>
</div>
</body></html>
