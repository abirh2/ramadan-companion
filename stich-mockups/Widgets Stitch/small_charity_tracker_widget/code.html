<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Charity Tracker Widget</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ec5b",
                        "background-light": "#f6f8f6",
                        "background-dark": "#102216",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1.25rem", // More like iOS widgets
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        /* Simulate iOS System Font stack if Inter fails, though Inter is requested */
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen p-8">
<!-- Wrapper to simulate phone screen environment or presentation -->
<div class="relative w-full max-w-sm mx-auto flex flex-col items-center gap-8">
<!-- Small Widget Container (approx 160x160pt logic, scaled for web) -->
<!-- Using a slightly larger fixed size for demo clarity -->
<div class="w-[170px] h-[170px] bg-background-light dark:bg-background-dark rounded-2xl shadow-sm border border-slate-200 dark:border-slate-800 p-4 flex flex-col justify-between relative overflow-hidden group">
<!-- Header / Icon -->
<div class="flex items-start justify-between">
<div class="w-8 h-8 rounded-full bg-primary/10 flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-xl">volunteer_activism</span>
</div>
</div>
<!-- Content Area -->
<div class="flex flex-col gap-3 mt-1">
<div>
<p class="text-xs text-slate-500 dark:text-slate-400 font-medium uppercase tracking-wide">Monthly</p>
<p class="text-slate-900 dark:text-slate-100 text-lg font-bold tracking-tight">£45.00</p>
</div>
<div>
<p class="text-xs text-slate-500 dark:text-slate-400 font-medium uppercase tracking-wide">Yearly</p>
<p class="text-slate-900 dark:text-slate-100 text-lg font-bold tracking-tight">£540.00</p>
</div>
</div>
<!-- Decorative muted background accent -->
<div class="absolute -bottom-6 -right-6 w-24 h-24 bg-primary/5 rounded-full blur-xl pointer-events-none"></div>
</div>
<!-- Alternate Dark Mode Version for Preview -->
<div class="w-[170px] h-[170px] bg-background-dark rounded-2xl shadow-lg border border-white/5 p-4 flex flex-col justify-between relative overflow-hidden group">
<!-- Header / Icon -->
<div class="flex items-start justify-between">
<div class="w-8 h-8 rounded-full bg-primary/20 flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-xl">favorite</span>
</div>
</div>
<!-- Content Area -->
<div class="flex flex-col gap-3 mt-1">
<div>
<p class="text-xs text-slate-400 font-medium uppercase tracking-wide">Monthly</p>
<p class="text-white text-lg font-bold tracking-tight">£45.00</p>
</div>
<div>
<p class="text-xs text-slate-400 font-medium uppercase tracking-wide">Yearly</p>
<p class="text-white text-lg font-bold tracking-tight">£540.00</p>
</div>
</div>
<!-- Decorative muted background accent -->
<div class="absolute -top-4 -right-4 w-20 h-20 bg-primary/10 rounded-full blur-2xl pointer-events-none"></div>
</div>
</div>
</body></html>
