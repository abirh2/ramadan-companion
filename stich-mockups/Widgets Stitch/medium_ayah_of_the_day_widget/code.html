<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Medium Ayah of the Day Widget</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#13ec5b",
              "background-light": "#f6f8f6",
              "background-dark": "#102216",
            },
            fontFamily: {
              "display": ["Inter", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        /* Simulating iOS Widget Environment */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #e5e5e5;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-gray-200 dark:bg-gray-900 font-display">
<!-- Widget Container simulating iOS Medium Widget Size (approx 360x170 for display purposes) -->
<div class="w-[360px] h-[170px] bg-background-light dark:bg-background-dark rounded-[22px] shadow-sm overflow-hidden relative flex flex-col p-5 group cursor-pointer transition-all hover:scale-[1.02]">
<!-- Background Decoration (Subtle Gradient) -->
<div class="absolute inset-0 bg-gradient-to-br from-primary/5 via-transparent to-transparent opacity-50 dark:opacity-20 pointer-events-none"></div>
<!-- Header: Title and Play Icon -->
<div class="flex justify-between items-start mb-2 z-10">
<div class="flex flex-col">
<span class="text-[11px] font-semibold text-primary uppercase tracking-wider">Ayah of the Day</span>
</div>
<button class="flex items-center justify-center w-8 h-8 rounded-full bg-primary/10 hover:bg-primary/20 text-primary transition-colors">
<span class="material-symbols-outlined text-[20px] ml-0.5" style="font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;">play_arrow</span>
</button>
</div>
<!-- Content: Arabic and English -->
<div class="flex-1 flex flex-col justify-center gap-1.5 z-10">
<!-- Arabic Text -->
<p class="text-right text-xl leading-snug font-medium text-slate-800 dark:text-slate-100 font-display truncate" dir="rtl">
                ٱللَّهُ لَآ إِلَٰهَ إِلَّا هُوَ ٱلْحَىُّ ٱلْقَيُّومُ
            </p>
<!-- English Translation -->
<p class="text-xs text-slate-500 dark:text-slate-400 leading-relaxed line-clamp-2">
                Allah! There is no deity except Him, the Ever-Living, the Sustainer of existence.
            </p>
</div>
<!-- Footer: Reference -->
<div class="mt-auto flex justify-between items-end z-10">
<span class="text-[10px] font-medium text-slate-400 dark:text-slate-500">
                Surah Al-Baqarah, 255
            </span>
<!-- Decorative Icon for Context -->
<span class="material-symbols-outlined text-slate-300 dark:text-slate-700 text-[18px]">
                menu_book
            </span>
</div>
</div>
</body></html>
