<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Deen Companion Widgets</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ec5b", // Provided primary
                        "background-light": "#f6f8f6", // Provided light bg
                        "background-dark": "#102216", // Provided dark bg
                        // Custom sand/neutral palette derived from primary hue (green) but shifted towards warm sand/taupe for the specific widget request, 
                        // while keeping the main app theme consistent.
                        "sand-50": "#fbfbf9",
                        "sand-100": "#f3f2ef",
                        "sand-200": "#e6e4de",
                        "sand-800": "#2c2b29",
                        "sand-900": "#1a1918",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "3xl": "1.5rem", "full": "9999px"},
                    boxShadow: {
                        'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05)',
                        'inner-light': 'inset 0 2px 4px 0 rgba(255, 255, 255, 0.6)',
                    }
                },
            },
        }
    </script>
<style>
        /* iOS-like smoothness */
        body {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        .ios-widget-shadow {
            box-shadow: 
                0 4px 6px -1px rgba(0, 0, 0, 0.02),
                0 10px 15px -3px rgba(0, 0, 0, 0.04),
                0 0 0 1px rgba(0,0,0,0.02);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display flex flex-col items-center justify-center min-h-screen p-4 sm:p-8">
<!-- Mockup Container imitating a phone screen section -->
<div class="w-full max-w-sm mx-auto space-y-8">
<header class="text-center mb-8">
<h1 class="text-slate-900 dark:text-slate-100 text-3xl font-bold tracking-tight mb-2">Deen Companion</h1>
<p class="text-slate-500 dark:text-slate-400">Home Screen Widgets</p>
</header>
<!-- Widget Section -->
<div class="grid grid-cols-2 gap-4">
<!-- Small Widget: Qibla (The requested design) -->
<!-- Dimensions: Roughly 150-170px square for iOS small widget style -->
<div class="aspect-square w-full relative overflow-hidden rounded-[22px] bg-[#fdfdfc] dark:bg-[#1a2c20] ios-widget-shadow flex flex-col items-center justify-between p-4 group">
<!-- Background ambient effect -->
<div class="absolute inset-0 bg-gradient-to-br from-[#f6f8f6] to-[#e8efe9] dark:from-[#102216] dark:to-[#0a160e] opacity-100"></div>
<!-- Content Container -->
<div class="relative z-10 flex flex-col items-center w-full h-full justify-between py-1">
<!-- Top Label -->
<div class="text-center">
<span class="text-[13px] font-semibold text-slate-800 dark:text-slate-200 tracking-wide">292° NW</span>
</div>
<!-- Compass Visual -->
<div class="relative w-20 h-20 flex items-center justify-center my-1">
<!-- Outer Ring (Static) -->
<div class="absolute inset-0 rounded-full border-[3px] border-slate-200 dark:border-slate-700"></div>
<!-- Decorative Ticks -->
<div class="absolute w-1 h-1 bg-slate-300 dark:bg-slate-600 rounded-full top-1 left-1/2 -translate-x-1/2"></div>
<div class="absolute w-1 h-1 bg-slate-300 dark:bg-slate-600 rounded-full bottom-1 left-1/2 -translate-x-1/2"></div>
<div class="absolute w-1 h-1 bg-slate-300 dark:bg-slate-600 rounded-full left-1 top-1/2 -translate-y-1/2"></div>
<div class="absolute w-1 h-1 bg-slate-300 dark:bg-slate-600 rounded-full right-1 top-1/2 -translate-y-1/2"></div>
<!-- Needle/Pointer (Pointing NW - approx 292 degrees) -->
<!-- 0 deg is North (Up). 292 is roughly Top-Left -->
<div class="absolute w-full h-full flex items-center justify-center transition-transform duration-700 ease-out" style="transform: rotate(-68deg);">
<div class="relative w-full h-full">
<!-- The Arrow Body -->
<div class="absolute top-2 left-1/2 -translate-x-1/2 w-0 h-0 border-l-[6px] border-l-transparent border-r-[6px] border-r-transparent border-b-[18px] border-b-primary drop-shadow-sm"></div>
<!-- Center pivot -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-2 h-2 bg-slate-800 dark:bg-slate-100 rounded-full z-10"></div>
</div>
</div>
</div>
<!-- Bottom Location -->
<div class="flex items-center gap-1 text-slate-500 dark:text-slate-400">
<span class="material-symbols-outlined text-[14px]" style="font-variation-settings: 'FILL' 1;">location_on</span>
<span class="text-[11px] font-medium truncate max-w-[80px]">London, UK</span>
</div>
</div>
</div>
<!-- Placeholder for another widget to show grid context (Prayer Times) -->
<div class="aspect-square w-full relative overflow-hidden rounded-[22px] bg-white dark:bg-[#1a2c20] ios-widget-shadow p-4 flex flex-col justify-between">
<div class="flex justify-between items-start">
<div class="flex flex-col">
<span class="text-[10px] uppercase font-bold text-primary tracking-wider">Asr</span>
<span class="text-2xl font-bold text-slate-900 dark:text-slate-100 -mt-1">15:42</span>
</div>
<span class="material-symbols-outlined text-slate-300 dark:text-slate-600" style="font-size: 20px;">wb_twilight</span>
</div>
<div class="space-y-2 mt-2">
<div class="flex justify-between items-center text-[11px] text-slate-500 dark:text-slate-400">
<span>Maghrib</span>
<span class="font-medium text-slate-700 dark:text-slate-300">18:15</span>
</div>
<div class="flex justify-between items-center text-[11px] text-slate-500 dark:text-slate-400">
<span>Isha</span>
<span class="font-medium text-slate-700 dark:text-slate-300">19:45</span>
</div>
</div>
</div>
</div>
<!-- Medium Widget Example (Full Width) -->
<div class="w-full h-40 relative overflow-hidden rounded-[22px] bg-white dark:bg-[#1a2c20] ios-widget-shadow flex">
<!-- Left Side: Date & Main Prayer -->
<div class="w-1/2 p-5 flex flex-col justify-between bg-primary/5 dark:bg-primary/10">
<div>
<span class="block text-[11px] font-semibold text-primary uppercase tracking-wider">Friday</span>
<span class="block text-3xl font-bold text-slate-900 dark:text-slate-100">12</span>
<span class="block text-[13px] text-slate-500 dark:text-slate-400">August</span>
</div>
<div>
<span class="text-[11px] text-slate-400 dark:text-slate-500 font-medium">Next: Maghrib</span>
</div>
</div>
<!-- Right Side: Countdown -->
<div class="w-1/2 p-5 flex flex-col items-center justify-center relative">
<!-- Background Pattern -->
<div class="absolute right-0 bottom-0 opacity-10 pointer-events-none">
<svg fill="none" height="100" viewbox="0 0 100 100" width="100" xmlns="http://www.w3.org/2000/svg">
<path class="text-primary" d="M50 0L100 50L50 100L0 50L50 0Z" fill="currentColor"></path>
</svg>
</div>
<div class="text-center z-10">
<span class="block text-[10px] text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-1">Time Left</span>
<span class="block text-2xl font-mono font-bold text-slate-800 dark:text-slate-100">02:33:14</span>
</div>
</div>
</div>
<!-- App Icon Row -->
<div class="flex justify-between px-2 pt-4">
<div class="flex flex-col items-center gap-1">
<div class="w-14 h-14 bg-primary rounded-[14px] flex items-center justify-center shadow-lg shadow-primary/30">
<span class="material-symbols-outlined text-white text-[32px]">mosque</span>
</div>
<span class="text-[11px] font-medium text-slate-900 dark:text-slate-100">Deen</span>
</div>
<div class="flex flex-col items-center gap-1 opacity-50 grayscale">
<div class="w-14 h-14 bg-slate-200 dark:bg-slate-700 rounded-[14px] flex items-center justify-center">
<span class="material-symbols-outlined text-slate-400 text-[28px]">settings</span>
</div>
<span class="text-[11px] font-medium text-slate-900 dark:text-slate-100">Settings</span>
</div>
<div class="flex flex-col items-center gap-1 opacity-50 grayscale">
<div class="w-14 h-14 bg-slate-200 dark:bg-slate-700 rounded-[14px] flex items-center justify-center">
<span class="material-symbols-outlined text-slate-400 text-[28px]">book_2</span>
</div>
<span class="text-[11px] font-medium text-slate-900 dark:text-slate-100">Quran</span>
</div>
<div class="flex flex-col items-center gap-1 opacity-50 grayscale">
<div class="w-14 h-14 bg-slate-200 dark:bg-slate-700 rounded-[14px] flex items-center justify-center">
<span class="material-symbols-outlined text-slate-400 text-[28px]">explore</span>
</div>
<span class="text-[11px] font-medium text-slate-900 dark:text-slate-100">Qibla</span>
</div>
</div>
</div>
</body></html>
